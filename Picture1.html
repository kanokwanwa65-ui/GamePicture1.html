<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Look and Answer - Vision Memory</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f3f7; --success: #00b894; --warning: #fdcb6e; --danger: #ff7675; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; min-height: 100vh; padding: 15px; touch-action: manipulation; }
        .container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; align-self: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #edf2f7; border-radius: 14px; font-size: 1rem; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 1.1rem; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; box-shadow: 0 4px 0 #4839a9; }
        button:active { transform: translateY(2px); box-shadow: none; }
        .game-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; background: #2d3436; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .img-container { width: 100%; max-width: 400px; height: 280px; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 4px solid #fff; position: relative; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        .timer-bar-bg { position: absolute; bottom: 0; left: 0; height: 8px; background: rgba(255,255,255,0.2); width: 100%; }
        .timer-bar { height: 100%; background: var(--success); width: 100%; }
        .answer-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
        .ans-btn { background: white; color: #2d3436; padding: 15px; border-radius: 12px; font-size: 1rem; border: none; cursor: pointer; text-align: left; font-weight: 500; box-shadow: 0 3px 0 #bdc3c7; }
        .ans-btn:active { background: var(--primary); color: white; }
        .hidden { display: none !important; }
        .sub-box { background: #f8f9fa; padding: 10px; border-radius: 15px; border: 1px solid #eee; min-height: 120px; color: #333; }
        .list-item { font-size: 0.75rem; display: flex; justify-content: space-between; margin-bottom: 5px; color: #444; }
        #avgResult { font-size: 3.5rem; margin: 0; line-height: 1; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container">
        <div id="admin-trigger" style="font-size:4rem; cursor:pointer;" onmousedown="startAdminTimer()" onmouseup="clearAdminTimer()" ontouchstart="startAdminTimer()" ontouchend="clearAdminTimer()">📸</div>
        <h2>Look and Answer</h2>
        <p style="font-size: 0.85rem; color: #636e72; margin-top: -10px;">สังเกตภาพ 10 วินาที แล้วตอบคำถามให้ถูกต้อง</p>
        <input type="text" id="uName" placeholder="ชื่อ - นามสกุล">
        <input type="text" id="uDept" placeholder="แผนก">
        <input type="text" id="uComp" placeholder="บริษัท">
        <button onclick="startSession()">เริ่มเกม</button>
        <div id="admin-controls" class="hidden" style="margin-top:20px;">
            <button onclick="exportCSV()" style="background:#b2bec3; width:100%;">📥 โหลดไฟล์ Excel</button>
            <button onclick="clearData()" style="background:#ff7675; width:100%; margin-top:5px;">🗑️ ล้างประวัติ</button>
        </div>
    </div>

    <div id="gameArea" class="game-screen">
        <h3 id="roundDisplay">ข้อที่ 1/5</h3>
        <div id="imgView">
            <div class="img-container">
                <img id="targetImg" src="">
                <div class="timer-bar-bg"><div id="tBar" class="timer-bar"></div></div>
            </div>
            <p>จดจำรายละเอียดภาพนี้ (10 วินาที)</p>
        </div>
        <div id="questionView" class="hidden" style="width: 100%; text-align: center;">
            <h3 id="questionText" style="margin-bottom: 20px;"></h3>
            <div class="answer-list" id="answerList" style="margin: 0 auto;"></div>
        </div>
    </div>

    <div id="summary-screen" class="container hidden">
        <h2>คะแนนรวมของคุณ</h2>
        <h1 id="avgResult">0%</h1>
        <p id="finalFeedback" style="font-weight: 600; margin: 15px 0; min-height: 3em;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="sub-box"><h4>🎯 ล่าสุด</h4><div id="myHistory"></div></div>
            <div class="sub-box"><h4>🏆 Top 5</h4><div id="topFive"></div></div>
        </div>
        <button onclick="location.reload()" style="background: #2d3436; margin-top: 15px;">ลองอีกรอบไหม?</button>
    </div>

    <script>
        // ใส่ลิงก์กูเกิ้ลชีทของคุณเรียบร้อยครับ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx74suEsJpXCvFEBri75bh9Kk9PcTQtbMTngmdRRYp-JBHHCKr7l0biGo71Kx_lhLUkgg/exec";
        
        let user = {}, score = 0, currentIdx = 0, selectedQuestions = [], adminTimer;
        const ADMIN_PASS = "3341";

        const questionsPool = [
            { img: "https://i.ibb.co/Mky4Z23g/reactiontime5.png", q: "ผู้ชายขับรถคันสีอะไร ?", a: ["สีน้ำเงิน", "สีแดง", "สีขาว"], correct: 0 },
            { img: "https://i.ibb.co/Fkd0XfQ8/Gemini-Generated-Image-qj2jljqj2jljqj2j.png", q: "รถคันสีขาวอยู่ฝั่งไหน ?", a: ["ขวา", "ซ้าย", "กลาง"], correct: 1 },
            { img: "https://i.ibb.co/LXtZq4nz/Gemini-Generated-Image-j3fw0pj3fw0pj3fw.png", q: "ข้างหลังรถคันสีแดงมีอะไรอยู่ ?", a: ["ถังขยะ", "รถตุ๊กตุ๊ก", "รปภ"], correct: 0 },
            { img: "https://i.ibb.co/hxTG51nR/reactiontime3.png", q: "มีรถสีส้มกี่คัน ?", a: ["2คัน", "1คัน", "ไม่มี"], correct: 2 },
            { img: "https://i.ibb.co/XZPvD3Sr/reactiontime4.png", q: "คนขับจักรยานใส่เสื้อสีอะไร ?", a: ["สีเขียว", "สีขาว", "สีชมพู"], correct: 1 }
        ];

        function startAdminTimer() { adminTimer = setTimeout(() => { if(prompt("รหัส Admin:") === ADMIN_PASS) document.getElementById('admin-controls').classList.toggle('hidden'); }, 3000); }
        function clearAdminTimer() { clearTimeout(adminTimer); }

        function startSession() {
            user = { name: document.getElementById('uName').value.trim(), dept: document.getElementById('uDept').value.trim(), comp: document.getElementById('uComp').value.trim() };
            if(!user.name || !user.dept || !user.comp) return alert("กรอกข้อมูลให้ครบถ้วนก่อนนะครับ");
            selectedQuestions = [...questionsPool].sort(() => Math.random() - 0.5);
            document.getElementById('setup-screen').classList.add('hidden');
            startRound();
        }

        function startRound() {
            if (currentIdx >= 5) return showSummary();
            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('imgView').classList.remove('hidden');
            document.getElementById('questionView').classList.add('hidden');
            document.getElementById('roundDisplay').innerText = `ข้อที่ ${currentIdx + 1}/5`;
            document.getElementById('targetImg').src = selectedQuestions[currentIdx].img;
            
            const bar = document.getElementById('tBar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '0%'; }, 100);
            setTimeout(() => { document.getElementById('imgView').classList.add('hidden'); showQuestion(); }, 10100);
        }

        function showQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('questionView').classList.remove('hidden');
            document.getElementById('questionText').innerText = q.q;
            const list = document.getElementById('answerList');
            list.innerHTML = '';
            q.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn'; btn.innerText = ans;
                btn.onclick = () => { if (i === q.correct) score += 20; currentIdx++; startRound(); };
                list.appendChild(btn);
            });
        }

        function showSummary() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('summary-screen').classList.remove('hidden');
            let fb = score >= 80 ? {t: "🚀 สุดยอด! สมาธินิ่งและจำเป็นเลิศ พร้อมลุยทุกเส้นทาง!", c: "#00b894"} : {t: "🛑 พักสายตาหน่อยนะจ๊ะ จำรายละเอียดไม่ค่อยได้เลย!", c: "#ff7675"};
            document.getElementById('avgResult').innerText = score + "%";
            document.getElementById('avgResult').style.color = fb.c;
            document.getElementById('finalFeedback').innerText = fb.t;
            document.getElementById('myHistory').innerHTML = `<div class="list-item"><span>คะแนนล่าสุด</span> <b>${score}%</b></div>`;
            saveScore(score);
            sendToSheet(score);
        }

        function saveScore(s) {
            let logs = JSON.parse(localStorage.getItem('lookAns_logs')) || [];
            logs.push({ date: new Date().toLocaleString('th-TH'), ...user, score: s });
            localStorage.setItem('lookAns_logs', JSON.stringify(logs));
            updateTopFive();
        }

        function updateTopFive() {
            let logs = JSON.parse(localStorage.getItem('lookAns_logs')) || [];
            let top5 = logs.sort((a,b) => b.score - a.score).slice(0, 5);
            document.getElementById('topFive').innerHTML = top5.map((s,i) => `<div class="list-item"><span>${i+1}. ${s.name}</span> <b>${s.score}%</b></div>`).join('');
        }

        function sendToSheet(s) {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    gameName: "Picture", // แก้ให้ตรงกับชื่อแท็บ Picture แล้วครับ
                    ...user, 
                    avg: s + "%", 
                    date: new Date().toLocaleString('th-TH') 
                })
            });
        }

        function exportCSV() {
            let logs = JSON.parse(localStorage.getItem('lookAns_logs')) || [];
            let csv = "\uFEFFวัน,ชื่อ,แผนก,บริษัท,คะแนน\n" + logs.map(l => `${l.date},${l.name},${l.dept},${l.comp},${l.score}`).join("\n");
            let link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "Picture_Report.csv"; link.click();
        }

        function clearData() { if(confirm("ล้างข้อมูล?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
